<!DOCTYPE html>
<html>
	<head>
		<base target="_top">
		<style>
			body {
				font-family: sans-serif;
				padding: 20px;
				text-align: center;
			}
			#message {
				margin-bottom: 20px;
			}
			.loader {
				border: 4px solid #f3f3f3;
				border-top: 4px solid #3498db;
				border-radius: 50%;
				width: 30px;
				height: 30px;
				animation: spin 2s linear infinite;
				margin: 10px auto;
			}
			@keyframes spin {
				0% { transform: rotate(0deg); }
				100% { transform: rotate(360deg); }
			}
		</style>
	</head>
	<body>
		<div id="status">
			<div id="message">Préparation du fichier d'exportation...</div>
			<div class="loader" id="loader"></div>
		</div>

		<script>
			window.onload = function()
			{
				google.script.run
					.withSuccessHandler(function(base64Data)
					{
						const fileName = "<?= fileName ?>";
						const byteCharacters = atob(base64Data);
						const byteNumbers = new Array(byteCharacters.length);
						
						for (let i = 0; i < byteCharacters.length; i++)
						{
							byteNumbers[i] = byteCharacters.charCodeAt(i);
						}
						
						const byteArray = new Uint8Array(byteNumbers);
						const blob = new Blob([byteArray], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
						
						const link = document.createElement('a');
						link.href = window.URL.createObjectURL(blob);
						link.download = fileName;
						link.click();
						
						document.getElementById('message').textContent = 'Exportation terminée. Le téléchargement va commencer.';
						document.getElementById('loader').style.display = 'none';
						
						setTimeout(function()
						{
							google.script.host.close();
						}, 3000);
					})
					.withFailureHandler(function(err)
					{
						document.getElementById('message').textContent = 'Erreur lors de l\'exportation : ' + err.message;
						document.getElementById('message').style.color = 'red';
						document.getElementById('loader').style.display = 'none';
					})
					.getExportData();
			}
		</script>
	</body>
</html>
